<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Silver Package Booking</title>
  <style>
    body {
      background: #e5f6fe;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }
    .silver-form-container {
      background: #ffffff;
      max-width: 430px;
      margin: 45px auto;
      padding: 32px 28px;
      border-radius: 12px;
      box-shadow: 0 3px 16px rgba(100, 120, 180, 0.10);
      color: #21272a;
    }
    .silver-form-container h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #6c91cb;
    }
    .package-label {
      display: block;
      background: #b0bad3;
      color: #fff;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 18px;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 5px 0;
      font-size: 17px;
    }
    label {
      font-weight: 600;
      margin-top: 10px;
      display: block;
      margin-bottom: 3px;
    }
    input, select, textarea {
      width: 100%;
      padding: 9px;
      margin-bottom: 13px;
      border-radius: 5px;
      border: 1px solid #a9bfdc;
      background: #f4f8fc;
      color: #222;
      font-size: 15px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 56px;
      resize: vertical;
    }
    button[type="submit"] {
      width: 100%;
      background: #6c91cb;
      color: #fff;
      padding: 12px 0;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      letter-spacing: 1px;
      margin-top: 8px;
      cursor: pointer;
      transition: background 0.18s;
    }
    button[type="submit"]:hover {
      background: #406bb6;
    }
  </style>
</head>
<body>
  <div class="silver-form-container">
    <h2>Book Silver Package</h2>
    <span class="package-label">Silver Package</span>
    <form>
      <label for="clientName">Full Name</label>
      <input type="text" id="clientName" name="clientName" required>

      <label for="clientEmail">Email</label>
      <input type="email" id="clientEmail" name="clientEmail" required>

      <label for="clientPhone">Mobile Number</label>
      <input type="tel" id="clientPhone" name="clientPhone" pattern="[0-9]{10}" required>

      <label for="eventType">Event Type</label>
      <select id="eventType" name="eventType" required>
        <option value="">-- Select Event --</option>
        <option value="wedding">Wedding</option>
        <option value="bday">Birthday Party</option>
        <option value="cultural">Cultural Events</option>
        <option value="corporate">Corporate Events</option>
        <option value="concert">Concerts</option>
        <option value="social">Social Gatherings</option>
        <option value="product">Product Launches</option>
        <option value="others">Others</option>
      </select>

      <label for="others">Other(optional)</label>
      <input type="text" id="others" name="others"> 

      <label for="eventDate">Preferred Event Date</label>
      <input type="date" id="eventDate" name="eventDate" required>

      <label for="venue">Venue/Location</label>
      <input type="text" id="venue" name="venue" required>

      <label for="guests">Expected No. of Guests</label>
      <input type="number" id="guests" name="guests" min="1" required>

      <label for="requirements">Special Requirements</label>
      <textarea id="requirements" name="requirements" placeholder="Enter any special requirements or services (e.g., decor, catering)..."></textarea>

      <button type="submit">Book Silver Package</button>
    </form>
  </div>
</body>
</html>
